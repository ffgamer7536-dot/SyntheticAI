dataset:
  train_dir: "d:/GitHub/Gaia/Offroad_Segmentation_Training_Dataset/train"
  val_dir: "d:/GitHub/Gaia/Offroad_Segmentation_Training_Dataset/val"
  test_dir: "d:/GitHub/Gaia/Offroad_Segmentation_testImages"
  img_height: 512
  img_width: 512
  dataset_stats_file: "dataset_stats.json"

class_mapping:
  100: 0   # Trees
  200: 1   # Lush Bushes
  300: 2   # Dry Grass
  500: 3   # Dry Bushes
  550: 4   # Ground Clutter
  600: 5   # Flowers
  700: 6   # Logs
  800: 7   # Rocks
  7100: 8  # Landscape
  10000: 9 # Sky

classes:
  - Trees
  - Lush Bushes
  - Dry Grass
  - Dry Bushes
  - Ground Clutter
  - Flowers
  - Logs
  - Rocks
  - Landscape
  - Sky

training:
  epochs: 200
  batch_size: 4
  learning_rate: 0.0001
  weight_decay: 0.0001
  num_workers: 4
  loss_type: "hybrid"
  use_tta: true

model:
  architecture: "deeplabv3plus"
  backbone: "efficientnet-b4"
  weights: "imagenet"
  in_channels: 3
  num_classes: 10

logging:
  run_dir: "runs"
  train_dir: "runs/train"
  val_dir: "runs/val"
  test_dir: "runs/test"
  visualizations_dir: "runs/visualizations"
  failure_cases_dir: "runs/failure_cases"
  checkpoint_dir: "saved_model_weights"
